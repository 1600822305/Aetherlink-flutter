name: aetherlink_flutter
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  dio: ^5.9.2
  socks5_proxy: ^2.1.1
  drift: ^2.34.0
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlite3: ^3.3.3
  # 实验性 native-vector search (sqlite-vec). Pinned to an alpha; gated behind the
  # default-off useSqliteVec flag and always degrades to the Dart cosine path.
  sqlite_vec: 0.1.7-alpha.3
  path: ^1.9.1
  path_provider: ^2.1.5
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  file_picker: ^11.0.0
  image_picker: ^1.2.2
  crop_your_image: ^1.1.0
  share_plus: ^11.0.0
  device_info_plus: ^11.0.0
  go_router: ^17.3.0
  # Lucide icon set for visual parity with the React app (ADR-0009). Pinned to an
  # exact version per the ADR's "pin a concrete version" guardrail.
  lucide_icons_flutter: 3.1.14+2
  # Opens the About page's external links (GitHub / QQ group / feedback).
  url_launcher: ^6.3.2
  # Renders the lucide GitHub glyph, which lucide_icons_flutter dropped along
  # with the other brand icons — used only for the About page's GitHub row.
  flutter_svg: ^2.3.0
  lpinyin: ^2.0.3
  gpt_markdown: ^1.1.7
  flutter_highlighting: ^0.9.0+11.8.0
  highlighting: ^0.9.0+11.8.0
  # Vendored (packages/diff_match_patch, Apache-2.0) — Myers line/char diff used
  # to render Cursor/Windsurf-style diffs for @aether/file-editor tool calls.
  # Kept local so we can tune the algorithm for our chat-block rendering.
  diff_match_patch:
    path: packages/diff_match_patch
  native_keyboard_height:
    path: packages/native_keyboard_height
  flutter_mermaid:
    path: packages/flutter_mermaid
  # Local SAF workspace plugin — see docs/本地SAF工作区插件-方法规格.md.
  # Only LocalSafBackend (under lib/features/workspace/) is allowed to import this.
  aetherlink_saf:
    path: packages/aetherlink_saf
  # 内置终端插件：PRoot 二进制（jniLibs）+ forkpty PTY 桥 + rootfs tar.gz 解压。
  # 只有 lib/features/terminal/ 的 data 层允许 import 它。见 docs/内置终端PRoot-设计文档.md。
  aetherlink_terminal:
    path: packages/aetherlink_terminal
  # DEX/APK 编辑插件（迁移自 capacitor-dex-editor）：dexlib2 + C++ 原生桥，
  # 供 @aether/dex-editor 内置 MCP 工具调用。见 lib/shared/mcp_tools/tools/dex_editor_tool.dart。
  dex_editor:
    path: packages/dex_editor
  # In-app performance monitor (外观设置→开发者工具→显示性能监控). Pure-Dart,
  # zero extra deps; per-thread frame timing + AI-friendly JSON export.
  aetherlink_perf:
    path: packages/aetherlink_perf
  # In-app developer tools (关于我们→开发者工具). Pure-Dart, zero extra deps;
  # DevTools-style panel host + global log capture. See docs/design/devtools-design.md.
  aetherlink_devtools:
    path: packages/aetherlink_devtools
  # 知识库 P3e 本地解析轨（docs/知识库功能-设计构想.md §5.2）：纯 Dart
  # DOCX→Markdown 转换（仅依赖 archive+xml，可在 isolate 跑）。
  docx_to_markdown:
    path: packages/docx_to_markdown
  # 知识库 P3e 本地解析轨（同上 §5.2）：PDF 文本层抽取 + 段落重排，
  # 基于 pdfrx_engine（PDFium，BSD-3）；pdfrx 插件负责各平台打包 PDFium 原生库。
  pdf_to_markdown:
    path: packages/pdf_to_markdown
  # 知识库本地解析轨（同上 §5.2，功能缺口④）：纯 Dart PPTX / XLSX / EPUB →
  # Markdown 转换（仅依赖 archive+xml，可在 isolate 跑）。
  office_to_markdown:
    path: packages/office_to_markdown
  # 知识库 PDF 本地解析的纯 Dart 引擎层（FFI 绑定 + 文本提取）。注意：不再依赖
  # pdfrx 插件，libpdfium.so 不打进安装包，而是首次使用时云端下载或手动
  # 导入（见 pdfium_engine_manager.dart 与 packages/pdfium_dart 的说明）。
  pdfrx_engine: ^0.4.3
  scrollview_observer: ^1.27.0
  # Voice feature: TTS + ASR
  flutter_tts:
    path: packages/flutter_tts
  just_audio: ^0.9.46
  record: ^7.1.0
  web_socket_channel: ^3.0.2
  permission_handler: ^11.3.1
  speech_to_text: ^7.4.0
  # Backup feature
  archive: ^4.0.2
  crypto: ^3.0.6
  xml: ^6.5.0
  http: ^1.3.0
  shared_preferences: ^2.2.3
  # Local notifications for backup reminders
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  system_fonts: ^1.0.1
  flutter_foreground_task: ^9.2.2
  dartssh2: 2.18.0
  # Terminal emulator widget for the SSH workspace PTY page (设计文档 §8.2),
  # same publisher (terminal.studio) as dartssh2.
  xterm: 4.0.0
  # Ed25519 keygen for the Termux one-tap setup (设计文档 §10.5 / Termux-A). This
  # is exactly the lib dartssh2 uses for ssh-ed25519 internally (already a
  # transitive dep), so generated keys are byte-compatible with SSHKeyPair.fromPem.
  # Pinned to the resolved transitive version.
  pinenacl: 0.6.0

dependency_overrides:
  # 用 vendored 副本覆盖 pdfrx_engine 的传递依赖：去掉了上游的 native-asset
  # 构建钩子，避免 PDFium 原生库（arm64 约 6MB）被打进安装包。
  pdfium_dart:
    path: packages/pdfium_dart

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4
  drift_dev: ^2.34.0
  share_plus_platform_interface: ^6.1.0
  image_picker_platform_interface: ^2.11.1
  path_provider_platform_interface: ^2.1.2

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/provider_icons/dark/
    - assets/images/provider_icons/light/
    - assets/images/search_icons/
    - assets/icons/
    - assets/fonts/google_font_categories.json
    - assets/model_registry/models.json

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
