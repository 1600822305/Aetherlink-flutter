# Static analysis configuration. See `docs/CONVENTIONS.md` §2.
#
# This is the core of boundary enforcement. The four import-boundary rules from
# `docs/PROJECT_STRUCTURE.md` §5 are enforced by a dedicated architecture test
# (`test/architecture/import_boundaries_test.dart`) that fails CI on any
# violation, plus `always_use_package_imports` below which bans `../../`
# cross-layer relative imports.
#
# NOTE: `custom_lint` / `riverpod_lint` are NOT wired in. Their latest releases
# cap at analyzer ^8, which is incompatible with the analyzer ^10+ required by
# this SDK's codegen toolchain (`drift_dev`, `riverpod_generator`). Migrate to a
# `custom_lint` boundary plugin once it supports analyzer ^10+.
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
    strict-inference: true
  errors:
    # Promote key conventions from warning to error so CI goes red.
    invalid_use_of_protected_member: error
    always_use_package_imports: error # ban ../../ cross-layer relative imports
    unused_import: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.drift.dart"

linter:
  rules:
    prefer_relative_imports: false # paired with always_use_package_imports
    public_member_api_docs: false
    require_trailing_commas: true
    prefer_const_constructors: true
    avoid_print: true # use a logger, never print
    unnecessary_late: true
    sort_constructors_first: true
