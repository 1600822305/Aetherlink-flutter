name: aetherlink_devtools
description: "Aetherlink in-app developer tools: a Chrome-DevTools-style panel host (Console / Network / Performance / Storage / Device) with global log capture, AI-friendly export and a draggable floating entry. Pure Dart/Flutter."
version: 0.0.1
publish_to: 'none'
homepage:

environment:
  sdk: ^3.9.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  # Required for DioDevInterceptor (the Network panel's capture point). dio is
  # already the app's core HTTP client (^5.9.2); no new third-party download.
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
