name: dex_editor
description: "Aetherlink DEX/APK editing plugin: native Android bridge over dexlib2 + C++ for reading, searching and rewriting Smali/DEX and repacking/signing APKs. Migrated from capacitor-dex-editor."
version: 0.0.1
homepage:

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.aetherlink.dexeditor
        pluginClass: DexEditorFlutterPlugin
